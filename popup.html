<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingMe</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>PingMe</h1>
                <div id="live-indicator" class="live-indicator" title="Next Alarm Status">
                    <span class="status-dot"></span>
                    <span id="next-alarm-text">Ready</span>
                </div>
            </div>
        </header>

        <main class="feed">
            <!-- Part 1: Quick Reminder Input (Sticky Focus) -->
            <section class="card add-reminder-card" id="reminder-section">
                <div class="input-row">
                    <input type="number" id="timer-minutes" placeholder="Mins" min="1" autofocus>
                    <button id="add-reminder-btn" class="btn-primary">Set</button>
                    <div class="quick-presets">
                        <button class="preset-btn" data-min="5">5m</button>
                        <button class="preset-btn" data-min="10">10m</button>
                        <button class="preset-btn" data-min="20">20m</button>
                        <button class="preset-btn" data-min="30">30m</button>
                    </div>
                </div>
                <input type="text" id="timer-note" placeholder="Note (optional)..." class="note-input">
            </section>

            <!-- Part 2: Site Monitoring Rule Input (Collapsible) -->
            <section class="card add-monitor-card collapsed" id="monitor-input-section">
                <div class="card-header-toggle" id="toggle-monitor-form">
                    <span class="header-icon">🌐</span>
                    <span class="header-title">Add Page Monitor</span>
                    <span class="chevron">▼</span>
                </div>
                <div class="collapsible-content">
                    <div class="input-grid">
                        <div class="row">
                            <select id="monitor-type" class="compact-select">
                                <option value="text">TEXT</option>
                                <option value="selector">CSS</option>
                                <option value="xpath">XPATH</option>
                            </select>
                            <input type="text" id="monitor-value" placeholder="Selector or text..." style="flex: 1;">
                        </div>
                        <div class="row secondary-controls">
                            <select id="monitor-task" class="task-select">
                                <option value="">No Task</option>
                            </select>
                            <div class="toggle-group">
                                <label class="toggle-label" title="Exact Path Only">
                                    <input type="checkbox" id="path-lock"> <span>📍 Path</span>
                                </label>
                                <label class="toggle-label" title="Stop after trigger">
                                    <input type="checkbox" id="auto-stop" checked> <span>🛑 Once</span>
                                </label>
                            </div>
                        </div>
                        <div class="row actions">
                            <button id="add-monitor-btn" class="btn-glow">Monitor Page</button>
                            <button id="clear-all-monitors-btn" class="btn-icon" title="Clear All Rules Across Sites">🗑️</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Part 3: Active Dashboard (The Feed) -->
            <div class="dashboard-lists">
                <!-- Site Monitoring Section (Will be moved to top via JS/CSS if active) -->
                <div id="monitor-list-container" class="list-container">
                    <h2 class="list-title">Monitoring</h2>
                    <div class="list" id="monitor-list">
                        <div class="empty-state">No rules for this page</div>
                    </div>
                </div>

                <!-- Reminder Section -->
                <div id="reminder-list-container" class="list-container">
                    <h2 class="list-title">Active Timers</h2>
                    <div class="list" id="reminder-list">
                        <div class="empty-state">No active reminders</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="global-tooltip" class="tooltip-overlay"></div>
    <script src="popup.js"></script>
</body>

</html>
